name: Update Repo Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh repo catalog
        run: python scripts/update_repo_catalog.py

      - name: Commit updated catalog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh repo catalog"
          file_pattern: assets/js/data/site-data.js index.html sitemap.xml
