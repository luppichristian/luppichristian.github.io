<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found - Christian Luppi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        h1 { font-size: 4rem; font-weight: 700; color: #6c8aff; margin-bottom: 8px; }
        p { color: #8888a0; font-size: 1.1rem; margin-bottom: 24px; }
        a {
            display: inline-block;
            padding: 12px 28px;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            color: #e0e0e8;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        a:hover { border-color: #6c8aff; color: #6c8aff; }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>This page doesn't exist.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
